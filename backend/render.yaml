services:
  - type: web
    name: whatsapp-qr-backend
    env: node
    plan: free # or starter
    buildCommand: npm install && PUPPETEER_CACHE_DIR=./.puppeteer npx puppeteer browsers install chrome
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: ./.puppeteer
    # Added persistent disk to save WhatsApp session
    disk:
      name: whatsapp-session
      mountPath: /opt/render/project/src/backend/.wwebjs_auth
      sizeGB: 1
