services:
  - type: web
    name: whatsapp-qr-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    disk:
      name: whatsapp-session
      mountPath: /opt/render/project/src/auth_info
      sizeGB: 1
