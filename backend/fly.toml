app = 'examora-whatsapp'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

# Persist WhatsApp auth session across deploys
[mounts]
  source = 'wa_auth_data'
  destination = '/app/auth_info'
